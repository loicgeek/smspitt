name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC trusted publishing + provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci

      # Use `npm pkg set` — unlike `npm version`, never errors if version already matches tag
      - name: Set version from tag
        run: npm pkg set version="${GITHUB_REF_NAME#v}"

      # No NODE_AUTH_TOKEN — npm exchanges the GitHub OIDC token directly.
      # Requires "Trusted publisher" configured on npmjs.com (see below).
      - name: Publish
        run: npm publish --provenance --access public
